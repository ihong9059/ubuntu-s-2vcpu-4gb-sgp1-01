<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel English - 여행 영어 회화</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid #e94560;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 2em;
            color: #e94560;
        }

        header p {
            color: #aaa;
            margin-top: 5px;
        }

        /* Screens */
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
        }

        /* Input Screen */
        .input-form {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #4ecca3;
            font-weight: bold;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #333;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1em;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4ecca3;
        }

        .form-group select option {
            background: #1a1a2e;
            color: white;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #4ecca3, #45b7aa);
            color: white;
        }

        /* Loading Screen */
        .loading-screen {
            text-align: center;
            padding: 50px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1.2em;
            color: #aaa;
        }

        .loading-status {
            margin-top: 15px;
            color: #4ecca3;
            font-size: 0.9em;
        }

        /* Learning Screen */
        #travel-map {
            height: 250px;
            width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
            z-index: 1;
        }

        .route-info {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        .route-stop {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .route-stop .city {
            padding: 5px 12px;
            background: rgba(78, 204, 163, 0.2);
            border-radius: 15px;
            font-size: 0.9em;
        }

        .route-stop .city.current {
            background: #e94560;
            color: white;
        }

        .route-stop .city.completed {
            background: #4ecca3;
            color: white;
        }

        .route-arrow {
            color: #666;
        }

        .scene-box {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .scene-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .scene-title {
            color: #e94560;
            font-size: 1.2em;
        }

        .scene-number {
            background: rgba(233, 69, 96, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .dialogue-box {
            margin-bottom: 20px;
        }

        .dialogue {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            align-items: flex-start;
        }

        .dialogue-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            flex-shrink: 0;
        }

        .dialogue-avatar.npc {
            background: rgba(78, 204, 163, 0.3);
        }

        .dialogue-avatar.player {
            background: rgba(233, 69, 96, 0.3);
        }

        .dialogue-content {
            flex: 1;
        }

        .dialogue-speaker {
            font-size: 0.85em;
            color: #888;
            margin-bottom: 5px;
        }

        .dialogue-text {
            background: rgba(255,255,255,0.1);
            padding: 12px 15px;
            border-radius: 10px;
            line-height: 1.5;
        }

        .dialogue-text.english {
            font-size: 1.1em;
            color: #fff;
        }

        .dialogue-text.korean {
            font-size: 0.9em;
            color: #aaa;
            margin-top: 5px;
            background: rgba(255,255,255,0.05);
        }

        .speak-btn {
            background: rgba(78, 204, 163, 0.3);
            border: 1px solid #4ecca3;
            color: #4ecca3;
            padding: 5px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.85em;
            margin-left: 10px;
        }

        .speak-btn:hover {
            background: rgba(78, 204, 163, 0.5);
        }

        .choices {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .choice-btn {
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s ease;
            font-size: 1em;
        }

        .choice-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }

        .choice-btn.correct {
            border-color: #4ecca3;
            background: rgba(78, 204, 163, 0.2);
        }

        .choice-btn.wrong {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.2);
        }

.choice-btn { display: flex; justify-content: space-between; align-items: center; }        .choice-text { flex: 1; text-align: left; }        .speak-choice { font-size: 1.2em; padding: 5px 10px; cursor: pointer; opacity: 0.7; }        .speak-choice:hover { opacity: 1; }
        .choice-btn:disabled {
            cursor: not-allowed;
        }

        .feedback {
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: rgba(78, 204, 163, 0.2);
            border: 1px solid #4ecca3;
        }

        .feedback.wrong {
            background: rgba(233, 69, 96, 0.2);
            border: 1px solid #e94560;
        }

        .next-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #4ecca3, #45b7aa);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            display: none;
        }

        .next-btn.show {
            display: block;
        }

        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ecca3, #e94560);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* Result Screen */
        .result-box {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
        }

        .result-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .result-title {
            font-size: 1.8em;
            color: #4ecca3;
            margin-bottom: 10px;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .stat-item {
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        .stat-value {
            font-size: 2em;
            color: #e94560;
            font-weight: bold;
        }

        .stat-label {
            color: #888;
            font-size: 0.9em;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .result-stats {
                grid-template-columns: 1fr;
            }

            #travel-map {
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✈️ Travel English</h1>
            <p>여행하며 배우는 실전 영어 회화</p>
            <div style="margin-top: 10px;"><a href="/" style="color: #4ecca3; text-decoration: none; font-size: 0.9em;">🏠 메인으로 돌아가기</a></div>
        </header>

        <!-- Input Screen -->
        <div id="input-screen" class="screen active">
            <div class="input-form">
                <h2 style="text-align: center; margin-bottom: 25px; color: #4ecca3;">여행 정보 입력</h2>

                <div class="form-group">
                    <label>🎯 학습 레벨</label>
                    <select id="level">
                        <option value="beginner">초급자 - 기본 회화, 힌트 제공</option>
                        <option value="intermediate">중급자 - 다양한 상황, 일부 힌트</option>
                        <option value="advanced">고급자 - 복잡한 상황, 힌트 없음</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>🛫 출발지</label>
                    <input type="text" id="departure" placeholder="예: 서울, Seoul" value="서울">
                </div>

                <div class="form-group">
                    <label>🛬 도착지</label>
                    <input type="text" id="destination" placeholder="예: 파리, Paris" value="파리">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>💰 예산 (USD)</label>
                        <input type="number" id="budget" placeholder="예: 2000" value="2000">
                    </div>

                    <div class="form-group">
                        <label>📅 기간 (일)</label>
                        <input type="number" id="duration" placeholder="예: 14" value="14">
                    </div>
                </div>

                <div class="form-group">
                    <label>🎯 여행 목적</label>
                    <select id="purpose">
                        <option value="tourism">관광/휴양 - 관광지, 맛집, 휴식</option>
                        <option value="backpacking">배낭여행 - 저예산, 현지 체험, 모험</option>
                        <option value="business">출장/비즈니스 - 회의, 비즈니스 미팅, 호텔</option>
                        <option value="study">어학연수/유학 - 학교, 홈스테이, 학생 생활</option>
                        <option value="working_holiday">워킹홀리데이 - 아르바이트, 장기체류, 현지 생활</option>
                        <option value="honeymoon">신혼여행 - 로맨틱, 고급 리조트, 특별한 경험</option>
                        <option value="family">가족여행 - 아이 동반, 안전한 코스, 가족 활동</option>
                        <option value="adventure">모험여행 - 액티비티, 트레킹, 익스트림 스포츠</option>
                    </select>
                </div>


                <div style="margin-top: 20px; text-align: center;">
                    <button class="btn btn-primary" onclick="loadAmsterdamScenario()">
                        🎬 학습 시작 (암스테르담)</button>
                    <button class="btn btn-secondary" style="margin-top: 10px;" onclick="location.href='/stats.html'">
                        📊 시나리오 통계 보기
                    
                    </button>
                </div>
            </div>
        </div>

        <!-- Loading Screen -->
        <div id="loading-screen" class="screen">
            <div class="loading-screen">
                <div class="spinner"></div>
                <div class="loading-text">시나리오를 생성하고 있습니다...</div>
                <div class="loading-status" id="loading-status">Claude가 시나리오를 작성 중입니다. 잠시만 기다려주세요...</div>
            </div>
        </div>

        <!-- Learning Screen -->
        <div id="learning-screen" class="screen">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>

            <div id="travel-map"></div>

            <div class="route-info" id="route-info">
                <!-- 경로 표시 -->
            </div>

            <div class="scene-box">
                <div class="scene-header">
                    <span class="scene-title" id="scene-title">공항 체크인 카운터</span>
                    <span class="scene-number" id="scene-number">Scene 1/10</span>
                </div>

                <div class="dialogue-box" id="dialogue-box">
                    <!-- 대화 내용 -->
                </div>

                <div class="choices" id="choices">
                    <!-- 선택지 -->
                </div>

                <div class="feedback" id="feedback">
                    <div id="feedback-text"></div>
                </div>

                <button class="next-btn" id="next-btn" onclick="nextScene()">
                    다음 장면 →
                </button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen">
            <div class="result-box">
                <div class="result-icon">🎉</div>
                <div class="result-title">여행 완료!</div>
                <p id="result-message">파리에 무사히 도착했습니다!</p>

                <div class="result-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="stat-scenes">10</div>
                        <div class="stat-label">완료한 장면</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="stat-correct">8</div>
                        <div class="stat-label">정답</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="stat-accuracy">80%</div>
                        <div class="stat-label">정확도</div>
                    </div>
                </div>

                <button class="btn btn-primary" onclick="location.reload()">
                    새로운 여행 시작
                </button>
            </div>
        </div>
    </div>

    <script>
        // 전역 변수
        let scenarioData = null;
        let currentSceneIndex = 0;
        let travelMap = null;
        let correctCount = 0;
        let totalAnswered = 0;
        let currentScenarioFile = null;

        // TTS 지원 여부
        const speechSupported = 'speechSynthesis' in window;

        // 진행 상황 저장
        function saveProgress() {
            if (!currentScenarioFile || !scenarioData) return;

            const progress = {
                scenarioFile: currentScenarioFile,
                sceneIndex: currentSceneIndex,
                correctCount: correctCount,
                totalAnswered: totalAnswered,
                savedAt: new Date().toISOString()
            };

            localStorage.setItem('travel_english_progress', JSON.stringify(progress));
            console.log('Progress saved:', progress);
        }

        // 진행 상황 불러오기
        function loadProgress() {
            const saved = localStorage.getItem('travel_english_progress');
            if (saved) {
                return JSON.parse(saved);
            }
            return null;
        }

        // 진행 상황 삭제
        function clearProgress() {
            localStorage.removeItem('travel_english_progress');
        }

        // 저장된 진행 상황 확인 및 이어하기 제안
        function checkSavedProgress(scenarioFile) {
            const progress = loadProgress();

            if (progress && progress.scenarioFile === scenarioFile && progress.sceneIndex > 0) {
                const percent = Math.round((progress.sceneIndex / scenarioData.scenes.length) * 100);
                const resume = confirm(
                    `이전 학습 기록이 있습니다.\n\n` +
                    `진행률: ${progress.sceneIndex}/${scenarioData.scenes.length} (${percent}%)\n` +
                    `정답률: ${progress.correctCount}/${progress.totalAnswered}\n\n` +
                    `이어서 하시겠습니까?\n(취소를 누르면 처음부터 시작합니다)`
                );

                if (resume) {
                    currentSceneIndex = progress.sceneIndex;
                    correctCount = progress.correctCount;
                    totalAnswered = progress.totalAnswered;
                    return true;
                } else {
                    clearProgress();
                }
            }
            return false;
        }

        // 화면 전환
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // API 서버 URL
        const API_SERVER = 'http://178.128.90.37:10001';

        // 시나리오 생성
        async function generateScenario() {
            const level = document.getElementById('level').value;
            const departure = document.getElementById('departure').value;
            const destination = document.getElementById('destination').value;
            const budget = document.getElementById('budget').value;
            const duration = document.getElementById('duration').value;
            const purpose = document.getElementById('purpose').value;

            if (!departure || !destination || !budget || !duration) {
                alert('모든 정보를 입력해주세요.');
                return;
            }

            showScreen('loading-screen');
            document.getElementById('loading-status').textContent = 'Claude가 시나리오를 작성 중입니다. 잠시만 기다려주세요...';

            try {
                const response = await fetch(`${API_SERVER}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ level, departure, destination, budget: Number(budget), duration: Number(duration), purpose })
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.success) {
                        document.getElementById('loading-status').textContent = '시나리오 로딩 중...';
                        await loadScenarioFromServer(data.filename);
                    } else {
                        alert('시나리오 생성 실패: ' + data.error);
                        showScreen('input-screen');
                    }
                } else {
                    throw new Error('서버 응답 오류');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('서버 연결 오류.\n\n샘플 시나리오로 테스트합니다.');
                loadSampleScenario();
            }
        }

        // 서버에서 시나리오 로드
        async function loadScenarioFromServer(filename) {
            try {
                console.log('Loading scenario:', filename);
                currentScenarioFile = filename;
                const url = `${API_SERVER}/scenarios/generated/${filename}`;
                console.log('Fetching from:', url);

                const response = await fetch(url);
                console.log('Response status:', response.status);

                if (response.ok) {
                    scenarioData = await response.json();
                    console.log('Scenario loaded:', scenarioData.info);
                    console.log('Scene count:', scenarioData.scenes.length);

                    // 저장된 진행 상황 확인 후, 이어하기 여부에 따라 시작
                    const isResume = checkSavedProgress(filename);
                    startLearning(isResume);
                } else {
                    throw new Error('시나리오 로드 실패: ' + response.status);
                }
            } catch (error) {
                console.error('Error loading scenario:', error);
                alert('시나리오 로드 실패: ' + error.message + '\n샘플로 시작합니다.');
                loadSampleScenario();
            }
        }

        // 기존 시나리오 불러오기
// 암스테르담 시나리오 바로 로드
        async function loadAmsterdamScenario() {
            try {
                const response = await fetch(API_SERVER + '/scenarios/generated/amsterdam_tourism.json');
                if (response.ok) {
                    scenarioData = await response.json();
                    startLearning();
                } else {
                    throw new Error("시나리오 로드 실패");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("암스테르담 시나리오 로드 실패");
            }
        }
        async function loadExistingScenario() {
            try {
                const response = await fetch(`${API_SERVER}/scenarios`);
                if (response.ok) {
                    const data = await response.json();
                    if (data.scenarios && data.scenarios.length > 0) {
                        // 가장 최근 시나리오 로드
                        await loadScenarioFromServer(data.scenarios[0]);
                    } else {
                        alert('저장된 시나리오가 없습니다.\n샘플 시나리오로 시작합니다.');
                        loadSampleScenario();
                    }
                }
            } catch (error) {
                // 서버 없이 샘플 데이터로 테스트
                loadSampleScenario();
            }
        }

        // 시나리오 로드 (로컬용 - 사용안함)
        async function loadScenario(filename) {
            try {
                const response = await fetch(`${API_SERVER}/scenarios/generated/${filename}`);
                if (response.ok) {
                    scenarioData = await response.json();
                    startLearning();
                }
            } catch (error) {
                console.error('Error loading scenario:', error);
                loadSampleScenario();
            }
        }

        // 학습 시작
        function startLearning(isResume = false) {
            // 이어하기가 아닌 경우에만 초기화
            if (!isResume) {
                currentSceneIndex = 0;
                correctCount = 0;
                totalAnswered = 0;
            }

            console.log('Starting learning - isResume:', isResume, 'sceneIndex:', currentSceneIndex);

            showScreen('learning-screen');
            initMap();
            renderRoute();
            showScene();
        }

        // 지도 초기화
        function initMap() {
            if (travelMap) {
                travelMap.remove();
            }

            travelMap = L.map('travel-map').setView([30, 50], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap contributors © CARTO'
            }).addTo(travelMap);

            // 경로 그리기
            const route = scenarioData.route;
            const coords = route.map(r => [r.lat, r.lng]);

            // 경로 라인
            L.polyline(coords, {
                color: '#4ecca3',
                weight: 3,
                opacity: 0.7,
                dashArray: '10, 10'
            }).addTo(travelMap);

            // 도시 마커
            route.forEach((city, index) => {
                const isStart = index === 0;
                const isEnd = index === route.length - 1;

                const marker = L.circleMarker([city.lat, city.lng], {
                    radius: isStart || isEnd ? 10 : 7,
                    fillColor: isStart ? '#4ecca3' : (isEnd ? '#e94560' : '#ffd93d'),
                    color: '#fff',
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.8
                }).addTo(travelMap);

                marker.bindPopup(`<b>${city.city}</b><br>${city.country}`);
            });

            // 지도 범위 조정
            travelMap.fitBounds(L.latLngBounds(coords), { padding: [30, 30] });
        }

        // 경로 정보 렌더링
        function renderRoute() {
            const routeInfo = document.getElementById('route-info');
            const route = scenarioData.route;
            const currentCity = scenarioData.scenes[currentSceneIndex]?.city || route[0].city;

            let html = '';
            route.forEach((city, index) => {
                const isCurrent = city.city === currentCity || currentCity.includes(city.city);
                const isCompleted = index < route.findIndex(r => r.city === currentCity.split('→')[0]);

                html += `
                    <div class="route-stop">
                        <span class="city ${isCurrent ? 'current' : ''} ${isCompleted ? 'completed' : ''}">${city.city}</span>
                    </div>
                `;

                if (index < route.length - 1) {
                    html += '<span class="route-arrow">✈️</span>';
                }
            });

            routeInfo.innerHTML = html;
        }

        // 장면 표시
        function showScene() {
            if (currentSceneIndex >= scenarioData.scenes.length) {
                showResult();
                return;
            }

            const scene = scenarioData.scenes[currentSceneIndex];

            // 진행률 업데이트
            const progress = ((currentSceneIndex) / scenarioData.scenes.length) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';

            // 장면 정보
            document.getElementById('scene-title').textContent = scene.location || scene.situation;
            document.getElementById('scene-number').textContent = `Scene ${currentSceneIndex + 1}/${scenarioData.scenes.length}`;

            // 대화 렌더링
            const dialogueBox = document.getElementById('dialogue-box');
            let dialogueHtml = '';

            // 새 형식: npcDialog / npcDialogKo 사용
            if (scene.npcDialog) {
                // 상황 설명
                if (scene.situation) {
                    dialogueHtml += `
                        <div class="dialogue">
                            <div class="dialogue-avatar npc">📍</div>
                            <div class="dialogue-content">
                                <div class="dialogue-speaker">상황</div>
                                <div class="dialogue-text korean" style="background: rgba(78, 204, 163, 0.1);">${scene.situation}</div>
                            </div>
                        </div>
                    `;
                }

                // NPC 대화
                dialogueHtml += `
                    <div class="dialogue">
                        <div class="dialogue-avatar npc">👤</div>
                        <div class="dialogue-content">
                            <div class="dialogue-speaker">상대방</div>
                            <div class="dialogue-text english">
                                ${scene.npcDialog}
                                ${speechSupported ? `<button class="speak-btn" onclick="speak('${scene.npcDialog.replace(/'/g, "\\'")}')">🔊</button>` : ''}
                            </div>
                            <div class="dialogue-text korean">${scene.npcDialogKo || ''}</div>
                        </div>
                    </div>
                `;

                // 응답 프롬프트
                dialogueHtml += `
                    <div class="dialogue">
                        <div class="dialogue-avatar player">😀</div>
                        <div class="dialogue-content">
                            <div class="dialogue-speaker">당신</div>
                            <div class="dialogue-text" style="background: rgba(233, 69, 96, 0.2); border: 1px dashed #e94560;">
                                💭 어떻게 대답할까요?
                            </div>
                        </div>
                    </div>
                `;
            }
            // 기존 형식: dialogues 배열 사용
            else if (scene.dialogues) {
                scene.dialogues.forEach(d => {
                    if (d.speaker === 'player' && (d.english === '...' || d.english.trim() === '')) {
                        return;
                    }

                    const isNpc = d.speaker !== 'player';
                    const avatar = isNpc ? '👤' : '😀';
                    const avatarClass = isNpc ? 'npc' : 'player';
                    const speakerName = getSpeakerName(d.speaker);

                    dialogueHtml += `
                        <div class="dialogue">
                            <div class="dialogue-avatar ${avatarClass}">${avatar}</div>
                            <div class="dialogue-content">
                                <div class="dialogue-speaker">${speakerName}</div>
                                <div class="dialogue-text english">
                                    ${d.english}
                                    ${speechSupported ? `<button class="speak-btn" onclick="speak('${d.english.replace(/'/g, "\\'")}')">🔊</button>` : ''}
                                </div>
                                <div class="dialogue-text korean">${d.korean}</div>
                            </div>
                        </div>
                    `;
                });

                dialogueHtml += `
                    <div class="dialogue">
                        <div class="dialogue-avatar player">😀</div>
                        <div class="dialogue-content">
                            <div class="dialogue-speaker">당신</div>
                            <div class="dialogue-text" style="background: rgba(233, 69, 96, 0.2); border: 1px dashed #e94560;">
                                💭 ${scene.playerResponse.prompt || '어떻게 대답할까요?'}
                            </div>
                        </div>
                    </div>
                `;
            }

            dialogueBox.innerHTML = dialogueHtml;

            // 선택지 렌더링
            const choicesBox = document.getElementById('choices');
            let choicesHtml = '';

            const choices = scene.playerResponse?.choices || [];
            choices.forEach((choice, index) => {
                choicesHtml += `
                    <button class="choice-btn" onclick="selectChoice(${index})">
                        <span class="choice-text">${index + 1}. ${choice.text}</span>
                        <span class="speak-choice" onclick="event.stopPropagation(); speak('${choice.text.replace(/'/g, "'")}')">🔊</span>
                    </button>
                `;
            });

            choicesBox.innerHTML = choicesHtml;

            // 피드백 및 다음 버튼 초기화
            document.getElementById('feedback').classList.remove('show', 'correct', 'wrong');
            document.getElementById('next-btn').classList.remove('show');

            // 경로 정보 업데이트
            renderRoute();
        }

        // 화자 이름 변환
        function getSpeakerName(speaker) {
            const names = {
                'staff': '직원',
                'flight_attendant': '승무원',
                'shop_staff': '점원',
                'immigration_officer': '입국 심사관',
                'hotel_staff': '호텔 직원',
                'waiter': '웨이터',
                'driver': '기사'
            };
            return names[speaker] || speaker;
        }

        // 선택지 선택
        function selectChoice(index) {
            const scene = scenarioData.scenes[currentSceneIndex];
            const choices = scene.playerResponse?.choices || [];
            const choice = choices[index];
            const buttons = document.querySelectorAll('.choice-btn');

            // 모든 버튼 비활성화
            buttons.forEach((btn, i) => {
                btn.disabled = true;
                if (choices[i]?.correct) {
                    btn.classList.add('correct');
                }
            });

            if (!choice.correct) {
                buttons[index].classList.add('wrong');
            }

            // 피드백 표시
            const feedback = document.getElementById('feedback');
            const feedbackMsg = choice.correct
                ? '잘했어요! 적절한 응답입니다.'
                : '이 상황에서는 다른 표현이 더 적절해요.';
            document.getElementById('feedback-text').innerHTML = `
                <strong>${choice.correct ? '✅ 정답!' : '❌ 다시 생각해보세요'}</strong><br>
                ${choice.feedback || feedbackMsg}
            `;
            feedback.classList.add('show', choice.correct ? 'correct' : 'wrong');

            // 통계 업데이트
            totalAnswered++;
            if (choice.correct) correctCount++;

            // 다음 버튼 표시
            document.getElementById('next-btn').classList.add('show');

            // 정답이면 음성 재생
            if (choice.correct && speechSupported) {
                speak(choice.text);
            }
        }

        // 다음 장면
        function nextScene() {
            currentSceneIndex++;
            saveProgress();  // 진행 상황 저장
            showScene();
        }

        // 결과 화면
        function showResult() {
            document.getElementById('stat-scenes').textContent = scenarioData.scenes.length;
            document.getElementById('stat-correct').textContent = correctCount;
            document.getElementById('stat-accuracy').textContent = Math.round((correctCount / totalAnswered) * 100) + '%';
            document.getElementById('result-message').textContent =
                `${scenarioData.info.destination}에 무사히 도착했습니다!`;

            // 학습 완료 시 진행 상황 삭제
            clearProgress();

            showScreen('result-screen');
        }

        // 음성 재생
// 여러 텍스트 순차 재생
        function speakMultiple(texts) {
            if (!speechSupported || texts.length === 0) return;
            
            window.speechSynthesis.cancel();
            let index = 0;
            
            function speakNext() {
                if (index >= texts.length) return;
                
                const utterance = new SpeechSynthesisUtterance(texts[index]);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                utterance.onend = function() {
                    index++;
                    setTimeout(speakNext, 500);
                };
                window.speechSynthesis.speak(utterance);
            }
            
            speakNext();
        }
        function speak(text) {
            if (!speechSupported) return;

            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        // 페이지 초기화 - URL 파라미터 확인
        window.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const scenarioFile = urlParams.get('scenario');

            if (scenarioFile) {
                // URL에서 시나리오 파일명이 있으면 자동 로드
                showScreen('loading-screen');
                document.getElementById('loading-status').textContent = '시나리오 로딩 중...';
                loadScenarioFromServer(scenarioFile);
            } else {
                // 파라미터가 없으면 입력 화면 표시
                showScreen('input-screen');
            }
        });
    </script>
