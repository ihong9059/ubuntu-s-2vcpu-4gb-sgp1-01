<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>SAM AI v3</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/apple-touch-icon-180.png">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link rel="stylesheet" href="/static/lib/highlight.css?v=8">
    <link rel="stylesheet" href="/static/css/style.css?v=8">
    <link rel="stylesheet" href="/static/css/markdown.css?v=8">
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h1 class="sidebar-title">SAM AI v3</h1>
            <button id="btn-new-chat" class="btn-icon" title="New Chat">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
            </button>
        </div>
        <div id="conversation-list" class="conversation-list"></div>
        <div class="sidebar-footer">
            <a href="/guide" class="btn-sidebar-footer" style="text-decoration: none;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>
                </svg>
                Guide
            </a>
            <button id="btn-settings" class="btn-sidebar-footer">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                Settings
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main id="main-content" class="main-content">
        <!-- Top Bar -->
        <header class="top-bar">
            <button id="btn-sidebar-toggle" class="btn-icon" title="Toggle Sidebar">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <div class="top-bar-center">
                <select id="mode-select" class="mode-select" autocomplete="off">
                    <option value="smart" selected>Smart</option>
                    <option value="compare">Compare</option>
                    <option value="single">Single</option>
                </select>
                <select id="provider-select" class="provider-select hidden" autocomplete="off">
                    <option value="ollama">Ollama</option>
                    <option value="claude">Claude</option>
                    <option value="openai">GPT</option>
                    <option value="gemini">Gemini</option>
                </select>
                <select id="model-select" class="model-select hidden" autocomplete="off">
                    <option value="">Default</option>
                </select>
                <span id="online-count" class="online-count"></span>
            </div>
            <div class="top-bar-right">
                <span id="provider-status" class="provider-dot offline" title="Checking..."></span>
            </div>
        </header>

        <!-- Chat Area -->
        <div id="chat-messages" class="chat-messages">
            <div id="welcome-message" class="welcome-message">
                <h2>SAM AI v3</h2>
                <p>Start a conversation by typing below.</p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div id="file-preview" class="file-preview hidden"></div>
            <div class="input-wrapper">
                <button id="btn-attach" class="btn-attach" title="Attach file">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                    </svg>
                </button>
                <input type="file" id="file-input" multiple accept="image/*,.pdf,.txt,.md,.csv,.docx" class="hidden">
                <textarea id="chat-input" class="chat-input" placeholder="Type a message..." rows="1"></textarea>
                <button id="btn-send" class="btn-send" title="Send">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
                <button id="btn-stop" class="btn-stop hidden" title="Stop">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <rect x="6" y="6" width="12" height="12" rx="2"/>
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button id="btn-close-settings" class="btn-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <section class="settings-section">
                    <h3>API Keys</h3>
                    <div class="form-group">
                        <label for="key-claude">Claude (Anthropic)</label>
                        <input type="password" id="key-claude" placeholder="sk-ant-...">
                    </div>
                    <div class="form-group">
                        <label for="key-openai">OpenAI</label>
                        <input type="password" id="key-openai" placeholder="sk-...">
                    </div>
                    <div class="form-group">
                        <label for="key-gemini">Gemini (Google)</label>
                        <input type="password" id="key-gemini" placeholder="AI...">
                    </div>
                    <button id="btn-save-keys" class="btn-primary">Save API Keys</button>
                </section>
                <section class="settings-section">
                    <h3>Preferences</h3>
                    <div class="form-group">
                        <label for="pref-mode">Default Mode</label>
                        <select id="pref-mode">
                            <option value="smart">Smart</option>
                            <option value="compare">Compare</option>
                            <option value="single">Single</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="pref-provider">Default Provider (Single mode)</label>
                        <select id="pref-provider">
                            <option value="ollama">Ollama</option>
                            <option value="claude">Claude</option>
                            <option value="openai">GPT</option>
                            <option value="gemini">Gemini</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="pref-system-prompt">System Prompt</label>
                        <textarea id="pref-system-prompt" rows="3" placeholder="You are a helpful AI assistant."></textarea>
                    </div>
                    <button id="btn-save-prefs" class="btn-primary">Save Preferences</button>
                </section>
            </div>
        </div>
    </div>

    <script src="/static/lib/marked.min.js?v=8"></script>
    <script src="/static/lib/highlight.min.js?v=8"></script>
    <script src="/static/js/markdown.js?v=8"></script>
    <script src="/static/js/api.js?v=8"></script>
    <script src="/static/js/chat.js?v=8"></script>
    <script src="/static/js/conversations.js?v=8"></script>
    <script src="/static/js/settings.js?v=8"></script>
    <script src="/static/js/app.js?v=8"></script>
    <script>
        // Detect standalone PWA mode (iPad home screen)
        if (window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches) {
            document.body.classList.add('standalone');
        }
        // iPad keyboard resize handler
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                document.documentElement.style.setProperty(
                    '--vh', window.visualViewport.height + 'px'
                );
            });
        }
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js');
        }
    </script>
</body>
</html>
