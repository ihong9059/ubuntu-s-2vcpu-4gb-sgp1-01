<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d0b1a">
    <title>SKZ AI - Stray Kids AI</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icons/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/markdown.css">
    <link rel="stylesheet" href="/static/lib/highlight.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>SKZ AI</h1>
                <div class="subtitle">Stray Kids AI Chat</div>
                <button class="btn-new-conv" id="btn-new-conv">+ 새 대화</button>
            </div>
            <div class="conversation-list" id="conversation-list"></div>
            <div class="sidebar-footer">
                <button class="btn-settings" id="btn-settings">⚙️ 설정</button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main-area">
            <!-- Member Selection Bar -->
            <div class="member-bar" id="member-bar"></div>

            <!-- Chat Header -->
            <div class="chat-header">
                <button class="btn-sidebar-toggle" id="btn-sidebar-toggle">☰</button>
                <div id="chat-member-info">🐺 방찬 <span class="member-position">리더, 프로듀서, 보컬, 래퍼</span></div>
                <button class="btn-news-toggle" id="btn-news-toggle">📰</button>
            </div>

            <!-- Chat Messages -->
            <div class="chat-messages" id="chat-messages"></div>

            <!-- Chat Input -->
            <div class="chat-input-area">
                <button class="btn-mic" id="btn-mic" title="음성 입력">🎤</button>
                <textarea id="chat-input" placeholder="메시지를 입력하세요..." rows="1"></textarea>
                <button class="btn-send" id="btn-send" title="전송">➤</button>
            </div>
        </main>

        <!-- News Panel -->
        <aside class="news-panel" id="news-panel">
            <div class="news-section">
                <div class="news-section-title">🎂 다가오는 생일</div>
                <div id="birthday-list"></div>
            </div>
            <div class="news-section">
                <div class="news-section-title">📅 일정</div>
                <div id="events-list"></div>
            </div>
            <div class="news-section">
                <div class="news-section-title">📰 K-pop 뉴스</div>
                <div id="news-list"></div>
            </div>
        </aside>
    </div>

    <!-- Settings Modal -->
    <div class="settings-modal" id="settings-modal">
        <div class="settings-content">
            <h2>⚙️ 설정</h2>
            <div class="setting-group">
                <label>Gemini API Key</label>
                <input type="password" id="setting-gemini-key" placeholder="AIza...">
            </div>
            <div class="settings-buttons">
                <button class="btn-secondary" id="btn-close-settings">취소</button>
                <button class="btn-primary" id="btn-save-key">저장</button>
            </div>
        </div>
    </div>

    <!-- Libraries -->
    <script src="/static/lib/marked.min.js"></script>
    <script src="/static/lib/highlight.min.js"></script>

    <!-- App Scripts -->
    <script src="/static/js/api.js"></script>
    <script src="/static/js/markdown.js"></script>
    <script src="/static/js/members.js"></script>
    <script src="/static/js/conversations.js"></script>
    <script src="/static/js/chat.js"></script>
    <script src="/static/js/voice.js"></script>
    <script src="/static/js/news.js"></script>
    <script src="/static/js/settings.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
